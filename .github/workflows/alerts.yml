# GitHub Actions — free scheduled alerts (Taiwan market + multi-asset)
# Secrets required (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   SMTP_USER, SMTP_PASSWORD, SMTP_TO   (optional but recommended)
#   SMTP_HOST (optional, default smtp.gmail.com), SMTP_PORT (optional, 587)

name: twstockals-alerts

on:
  schedule:
    # Times are UTC. Taiwan = UTC+8.
    # Hourly rough cover for TW session 07-14 TW => 23-06 UTC
    - cron: "5 23,0,1,2,3,4,5,6 * * 1-5"
    # EOD digest ~14:15 TW => 06:15 UTC
    - cron: "15 6 * * 1-5"
    # Multi-asset evening ~20:00 TW => 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "all | intraday | eod | multi"
        required: true
        default: "all"

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: |
          mkdir -p reports/latest reports/history config
          # Minimal targets if missing (private fork should commit config/my_targets.json without secrets)
          if [ ! -f config/my_targets.json ]; then
            echo '{"portfolio":[],"watchlist":[],"multi_asset":{"pause_us_ib":true},"force_exit_codes":[]}' > config/my_targets.json
          fi
          if [ ! -f config/alert_rules.json ]; then
            echo '{}' > config/alert_rules.json
          fi

      - name: Restore alert state cache
        uses: actions/cache@v5
        with:
          path: reports/alert_state.json
          key: alert-state-v1
          restore-keys: |
            alert-state-

      - name: Run alerts
        env:
          TWSTOCKALS_CLOUD: "1"
          TWSTOCKALS_WORKSPACE: ${{ github.workspace }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          NOTIFY_DRY_RUN: "false"
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            H=$(date -u +%H)
            if [ "$H" = "12" ]; then
              MODE=multi
            elif [ "$H" = "06" ]; then
              MODE=eod
            else
              MODE=intraday
            fi
          fi
          echo "Selected mode=$MODE"
          python src_scripts/run_all_alerts.py --mode "$MODE" --force --force-notify --no-popup

      - name: Upload alert state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: alert-state
          path: reports/alert_state.json
          if-no-files-found: ignore
          retention-days: 7
