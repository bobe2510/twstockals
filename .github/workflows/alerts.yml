# GitHub Actions — free scheduled alerts (Taiwan market + multi-asset)
# Secrets required (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   SMTP_USER, SMTP_PASSWORD, SMTP_TO   (optional but recommended)
#   SMTP_HOST (optional, default smtp.gmail.com), SMTP_PORT (optional, 587)

name: twstockals-alerts

on:
  schedule:
    # Times are UTC. Taiwan = UTC+8.
    # ~09:05 TW：僅大盤／匯率等（不再每小時推個股破防守）
    - cron: "5 1 * * 1-5"
    # ~13:10 TW：收盤確認破防守（避開延遲，早於 13:20）
    - cron: "10 5 * * 1-5"
    # ~13:15 TW：收盤確認備援（GitHub 排程常延遲／漏跑）
    - cron: "15 5 * * 1-5"
    # ~14:15 TW：完整收盤執行清單（停利／停損／出清）
    - cron: "15 6 * * 1-5"
    # ~20:00 TW：多資產（黃金允許／推薦用詞、匯率、BTC、美股觀測）
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "all | intraday | close_confirm | eod | multi"
        required: true
        default: "all"

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: |
          mkdir -p reports/latest reports/history config
          if [ ! -f config/my_targets.json ]; then
            echo '{"portfolio":[],"watchlist":[],"multi_asset":{"pause_us_ib":true},"force_exit_codes":[]}' > config/my_targets.json
          fi
          if [ ! -f config/alert_rules.json ]; then
            echo '{}' > config/alert_rules.json
          fi

      - name: Restore alert state cache
        uses: actions/cache@v5
        with:
          path: reports/alert_state.json
          key: alert-state-v1
          restore-keys: |
            alert-state-

      - name: Run alerts
        env:
          TZ: Asia/Taipei
          TWSTOCKALS_CLOUD: "1"
          TWSTOCKALS_WORKSPACE: ${{ github.workspace }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          NOTIFY_DRY_RUN: "false"
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            # Prefer exact cron match so delayed runs still pick the right mode
            case "$SCHEDULE_CRON" in
              "5 1 * * 1-5") MODE=intraday ;;
              "10 5 * * 1-5"|"15 5 * * 1-5") MODE=close_confirm ;;
              "15 6 * * 1-5") MODE=eod ;;
              "0 12 * * *") MODE=multi ;;
              *)
                # Fallback by Taipei wall-clock (TZ=Asia/Taipei)
                H=$(date +%H)
                M=$(date +%M)
                if [ "$H" = "20" ]; then
                  MODE=multi
                elif [ "$H" = "13" ] && [ "$M" -ge 05 ] && [ "$M" -le 30 ]; then
                  MODE=close_confirm
                elif [ "$H" = "14" ]; then
                  MODE=eod
                else
                  MODE=intraday
                fi
                ;;
            esac
          fi
          echo "Selected mode=$MODE schedule='${SCHEDULE_CRON:-manual}' Taipei=$(date +%H:%M) UTC=$(date -u +%H:%M)"
          python src_scripts/run_all_alerts.py --mode "$MODE" --force --force-notify --no-popup

      - name: Upload alert state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: alert-state
          path: reports/alert_state.json
          if-no-files-found: ignore
          retention-days: 7
