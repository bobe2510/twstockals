# GitHub Actions — free scheduled alerts (Taiwan market + multi-asset)
# Secrets required (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   SMTP_USER, SMTP_PASSWORD, SMTP_TO   (optional but recommended)
#   SMTP_HOST (optional, default smtp.gmail.com), SMTP_PORT (optional, 587)

name: twstockals-alerts

on:
  schedule:
    # Times are UTC. Taiwan = UTC+8.
    # ~08:30 TW：若前一日 EOD 有 0050／正2 操作 → 開盤前提醒
    - cron: "30 0 * * 1-5"
    # ~09:05 TW：僅大盤／匯率等（不再每小時推個股破防守）
    - cron: "5 1 * * 1-5"
    # ~10:30 TW：多資產上班窗（黃金／外匯｜台銀可執行）
    - cron: "30 2 * * 1-5"
    # ~12:00 TW：BTC／ETH 午間狀態（每天，含假日）
    - cron: "0 4 * * *"
    # ~13:10 TW：收盤確認破防守（避開延遲，早於 13:20）
    - cron: "10 5 * * 1-5"
    # ~13:15 TW：收盤確認備援（GitHub 排程常延遲／漏跑）
    - cron: "15 5 * * 1-5"
    # ~14:15 TW：完整收盤執行清單 + 觀測門檻請買進
    - cron: "15 6 * * 1-5"
    # ~15:00 TW：多資產上班窗複核（黃金／外匯）
    - cron: "0 7 * * 1-5"
    # ~20:30 TW：多資產晚報（黃金複核、BTC、美股觀測）
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "all | preopen | crypto_noon | intraday | close_confirm | eod | multi_day | multi"
        required: true
        default: "all"

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare dirs
        run: |
          mkdir -p reports/latest reports/history config
          if [ ! -f config/my_targets.json ]; then
            echo '{"portfolio":[],"watchlist":[],"multi_asset":{"pause_us_ib":true},"force_exit_codes":[]}' > config/my_targets.json
          fi
          if [ ! -f config/alert_rules.json ]; then
            echo '{}' > config/alert_rules.json
          fi
          if [ ! -f config/grade_buy_policy.json ]; then
            echo '{"products":{}}' > config/grade_buy_policy.json
          fi

      # deploy_ladder_state：手動對帳／git 為準，勿用 cache 覆寫（舊 cache 曾誤把「推播」當「已買」）
      - name: Restore alert state cache
        uses: actions/cache@v5
        with:
          path: |
            reports/alert_state.json
            reports/latest/eod_pending_ops.json
            reports/latest/close_confirm_ran.json
          key: alert-state-v4-${{ github.run_id }}
          restore-keys: |
            alert-state-v4-

      - name: Run alerts
        env:
          TZ: Asia/Taipei
          TWSTOCKALS_CLOUD: "1"
          TWSTOCKALS_WORKSPACE: ${{ github.workspace }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          NOTIFY_DRY_RUN: "false"
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          EXTRA=""
          if [ -z "$MODE" ]; then
            case "$SCHEDULE_CRON" in
              "30 0 * * 1-5") MODE=preopen ;;
              "5 1 * * 1-5") MODE=intraday ;;
              "30 2 * * 1-5"|"0 7 * * 1-5") MODE=multi_day ;;
              "0 4 * * *") MODE=crypto_noon ;;
              "10 5 * * 1-5") MODE=close_confirm ;;
              "15 5 * * 1-5") MODE=close_confirm; EXTRA="--backup" ;;
              "15 6 * * 1-5") MODE=eod ;;
              "30 12 * * *") MODE=multi ;;
              *)
                H=$(date +%H)
                M=$(date +%M)
                if [ "$H" = "08" ]; then
                  MODE=preopen
                elif [ "$H" = "12" ]; then
                  MODE=crypto_noon
                elif [ "$H" = "20" ]; then
                  MODE=multi
                elif [ "$H" = "10" ] || [ "$H" = "15" ]; then
                  MODE=multi_day
                elif [ "$H" = "13" ] && [ "$M" -ge 05 ] && [ "$M" -le 12 ]; then
                  MODE=close_confirm
                elif [ "$H" = "13" ] && [ "$M" -ge 13 ] && [ "$M" -le 30 ]; then
                  MODE=close_confirm
                  EXTRA="--backup"
                elif [ "$H" = "14" ]; then
                  MODE=eod
                else
                  MODE=intraday
                fi
                ;;
            esac
          fi
          echo "Selected mode=$MODE extra='$EXTRA' schedule='${SCHEDULE_CRON:-manual}' Taipei=$(date +%H:%M) UTC=$(date -u +%H:%M)"
          PYTHONPATH=src_scripts python -c "from tw_time import taiwan_now; import os; print('taiwan_now', taiwan_now().isoformat(), 'TZ', os.environ.get('TZ'))"
          # 排程不帶 --force-notify，保留 alert_state 去重；手動除錯可自行加
          python src_scripts/run_all_alerts.py --mode "$MODE" --force --no-popup $EXTRA

      - name: Upload alert state artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: alert-state
          path: |
            reports/alert_state.json
            reports/latest/deploy_ladder_state.json
            reports/latest/eod_pending_ops.json
            reports/latest/close_confirm_ran.json
          if-no-files-found: ignore
          retention-days: 7
